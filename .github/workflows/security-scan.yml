name: "Security Scan"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  code-audit:
    name: "SAST — Hyperium Code-Audit"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Code-Audit
        run: |
          git clone --depth 1 https://github.com/hyperiumia/hyperium-code-audit.git /tmp/code-audit
          cd /tmp/code-audit
          pip install -r requirements.txt

      - name: Run Security Scan
        run: |
          cd /tmp/code-audit
          python -m src.cli scan ${{ github.workspace }} --format sarif --min-confidence 0.5
          mkdir -p ${{ github.workspace }}/reports
          cp -r reports/* ${{ github.workspace }}/reports/

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/
          category: "code-audit"

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: reports/*.html
          retention-days: 30
