name: Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write

jobs:
  code-audit:
    name: Hyperium Code-Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Code-Audit
        uses: hyperiumia/hyperium-code-audit@v4
        with:
          path: "."
          format: "sarif"
          fail-on: "critical"
          verify-secrets: "true"
